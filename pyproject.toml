[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=61.0", "wheel"]

[project]
authors = [
  {name = "shahab"},
]
dependencies = [
  "ultralytics",
  "clearml",
  "pyyaml",
  "opencv-python",
  "torch",
  "torchvision",
  "onnx",
  "onnxruntime",
  "tabulate",
  "termcolor",
  "ruamel.yaml",
  "terminaltables",
  "blessed",
  "rich",
  "super-gradients",
  "uv",
]
description = "Automated YOLO training utilities and CLI"
license = {file = "LICENSE.md"}
name = "yolomatic"
readme = "README.md"
requires-python = ">=3.13,<3.14"
version = "0.1.2"

[tool.setuptools]
packages = ["src", "src.config", "src.models", "src.cli", "src.trainers", "src.datasets", "src.utils"]

[project.scripts]
yolomatic = "src.cli.run:main"
