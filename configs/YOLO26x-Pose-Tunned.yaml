settings:
  model_family: yolo
  model_type: yolo26x-pose
  dataset: poles_yolo_pose
  task: pose

clearml:
  enabled: true
  require_configured: false
  project_name_template: '{family} Training - {model}'
  task_name_format: '%Y-%m-%d-%H-%M'
  upload_final_model: true
  upload_artifacts: true
  log_hyperparameters: true
  log_dataset_summary: true
  project_name: YOLO Training - YOLO26X-POSE

training:
  epochs: 300
  patience: 50
  imgsz: 640
  # Keep this as a fixed integer. Ultralytics 8.4.71 AutoBatch substantially
  # overestimates YOLO26x-Pose memory (batch: 0.85 selected only 3 images and
  # used ~4.75 GiB). Batch 12 was verified on the 16 GiB RTX 4070 Ti SUPER at
  # ~13.1 GiB PyTorch memory with no OOM; do not restore fractional/-1 AutoBatch
  # without first confirming that the upstream pose profiler has been fixed.
  batch: 12
  cache: true
  workers: 8
  optimizer: auto
  device: '0'
  save: true
  close_mosaic: 20
  cos_lr: false
  amp: true
  pretrained: true
  seed: 0

