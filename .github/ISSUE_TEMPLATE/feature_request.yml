name: Feature request
description: Suggest a new workflow, model family, integration, or UX improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that YOLOmatic does not support well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the user-facing behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Training
        - Prediction
        - Dataset preparation
        - Benchmarking
        - Upload/deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link papers, repos, docs, benchmarks, or example datasets.
